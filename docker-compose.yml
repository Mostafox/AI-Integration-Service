# Joins shared YARA infra on yara-net (see ../infra).
#
#   docker network create yara-net   # once
#   cd ../infra && docker compose up -d
#   cd ../AI-Integration-Service && docker compose up --build
#
# If infra already existed before yara_ai was added:
#   docker exec -i yara-postgres psql -U yara -d postgres < ../infra/postgres/add-yara-ai.sql

services:
  migrate:
    build:
      context: .
      target: build
    command: ["npx", "drizzle-kit", "migrate"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-yara}:${POSTGRES_PASSWORD:-yara_secret_password}@yara-postgres:5432/${AI_DATABASE_NAME:-yara_ai}
    networks:
      - yara-net
    restart: "no"

  app:
    build:
      context: .
      target: runner
    container_name: ai-integration-service
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-yara}:${POSTGRES_PASSWORD:-yara_secret_password}@yara-postgres:5432/${AI_DATABASE_NAME:-yara_ai}
      REDIS_URL: redis://:${REDIS_PASSWORD:-yara_redis_password}@yara-redis:6379
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - yara-net
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  yara-net:
    external: true
