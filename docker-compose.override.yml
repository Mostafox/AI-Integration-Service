# Dev override: run the app with tsx hot-reload against shared YARA infra.
# Used automatically by `docker compose up` (requires ../infra up on yara-net).
services:
  app:
    build:
      target: build
    command: ["npm", "run", "dev"]
    environment:
      NODE_ENV: development
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./drizzle.config.ts:/app/drizzle.config.ts
