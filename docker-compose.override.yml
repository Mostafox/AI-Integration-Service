# Dev override: run the app with tsx hot-reload against compose-provided
# Postgres + Redis. Used automatically by `docker compose up`.
services:
  app:
    build:
      target: build
    command: ["npm", "run", "dev"]
    environment:
      NODE_ENV: development
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./drizzle.config.ts:/app/drizzle.config.ts
